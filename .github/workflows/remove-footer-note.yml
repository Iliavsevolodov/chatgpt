name: Remove footer note

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/remove-footer-note.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove footer note
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          text = p.read_text(encoding='utf-8')
          text = text.replace('<br>Содержание будет дополняться.', '')
          text = text.replace('Содержание будет дополняться.', '')
          p.write_text(text, encoding='utf-8')
          PY
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Remove footer note"
          git push
